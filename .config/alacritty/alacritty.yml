env:
  TERM: alacritty

window:
  dimensions:
    columns: 240
    lines: 60

  position:
    x: 0
    y: 0

  padding:
    x: 0
    y: 0

  dynamic_padding: false

  decorations: none

  startup_mode: Maximized

  title: Alacritty

  dynamic_title: true

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: Operator Mono
    style: Book

  bold:
    family: Operator Mono
    style: Medium

  italic:
    family: Operator Mono
    style: Book Italic

  bold_italic:
    family: Operator Mono
    style: Bold Italic

  size: 11.0

  # Offset is the extra space around each character. `offset.y` can be thought
  # of as modifying the line spacing, and `offset.x` as modifying the letter
  # spacing.
  #offset:
  #  x: 0
  #  y: 0

  # Glyph offset determines the locations of the glyphs within their cells with
  # the default being at the bottom. Increasing `x` moves the glyph to the
  # right, increasing `y` moves the glyph upward.
  #glyph_offset:
  #  x: 0
  #  y: 0

# If `true`, bold text is drawn using the bright color variants.
draw_bold_text_with_bright_colors: true

colors:
  primary:
    background: "0x2d2a2e"
    foreground: "0xe3e1e4"

  normal:
    black: "0x1a181a"
    red: "0xf85e84"
    green: "0x9ecd6f"
    yellow: "0xe5c463"
    blue: "0x7accd7"
    magenta: "0xab9df2"
    cyan: "0xef9062"
    white: "0xe3e1e4"

  bright:
    black: "0x1a181a"
    red: "0xf85e84"
    green: "0x9ecd6f"
    yellow: "0xe5c463"
    blue: "0x7accd7"
    magenta: "0xab9df2"
    cyan: "0xef9062"
    white: "0xe3e1e4"
